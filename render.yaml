services:
  - type: web
    name: edo-ldpr-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -c "from edo_ldpr_cloud import app_flask, init_db, seed_database; app_flask.app_context().push(); init_db(); seed_database(); app_flask.run(host='0.0.0.0', port=5000)"
