services:
  - type: web
    name: edo-ldpr-server
    runtime: python
    plan: free
    buildCommand: pip install -r render_requirements.txt
    startCommand: gunicorn edo_server_render:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: edo-ldpr-db
          property: connectionString

databases:
  - name: edo-ldpr-db
    plan: free
    postgresMajorVersion: 15
